<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Donor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h2>Register As Donor</h2>
        </div>
        
        <form class="reg-form">
            <div class="input-group">
                <label>Full Name</label>
                <div class="row">
                    <input type="text" placeholder="First Name">
                    <input type="text" placeholder="Last Name">
                </div>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="text" placeholder="Number">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Mail Id">
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Address</label>
                    <textarea placeholder="Type Here"></textarea>
                </div>
                <div class="input-group">
                    <label>Age</label>
                    <input type="number" placeholder="Age">
                    <label>Blood Group</label>
                    <select>
                        <option>Select</option>
                        <option>A+</option>
                        <option>B+</option>
                        <option>O+</option>
                        <option>AB+</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
    <label>Last Donation</label>
    <div class="row">
        <select id="last_month" name="last_month" style="flex: 1; margin-right: 10px; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
            <option value="none">Never Donated (မလှူဖူးသေးပါ)</option>
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
        </select>

        <select id="last_year" name="last_year" style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
            <option value="">Year</option>
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
        </select>
    </div>
    <small id="date-error" style="color: red; display: none; margin-top: 5px;">
        သွေးလှူပြီး ၄ လ မပြည့်သေးပါက အလှူရှင်အဖြစ် မှတ်ပုံတင်၍မရသေးပါ။
    </small>
</div>
<button type="submit" class="submit-btn">Submit</button>
    </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
