<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Blood Donation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container" style="max-width: 450px;">
        <div class="form-header">
            <h2>Log In</h2>
        </div>
        
        <form class="reg-form">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="submit-btn" style="width: 100%; float: none;">Log In</button>
            
            <p style="text-align: center; margin-top: 20px; font-size: 14px;">
                Don't have an account? <a href="register.html" style="color: #a3002d; font-weight: bold;">Register Here</a>
            </p>
        </form>
    </div>

</body>
</html>
